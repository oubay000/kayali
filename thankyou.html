  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #C9A96E;
      --gold-light: #E8D5A3;
      --gold-dark: #8A6C3A;
      --ink: #0C0B09;
      --ink2: #161510;
      --dust: #F0E8DC;
      --mist: #8C8278;
    }

    body {
      background: var(--ink);
      color: var(--dust);
      font-family: 'Cairo', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: 1.5rem;
    }

    /* GLOWS */
    .glow-orb {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201, 169, 110, 0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .glow-orb-1 {
      width: 400px;
      height: 400px;
      top: 10%;
      right: -100px;
    }

    .thank-you-box {
      position: relative;
      z-index: 2;
      background: rgba(31, 29, 23, 0.8);
      border: 2px solid var(--gold);
      padding: 3rem 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(201, 169, 110, 0.15);
      max-width: 400px;
      width: 100%;
      opacity: 0;
      animation: scaleUp 0.6s ease-out forwards;
    }

    .icon-check {
      width: 80px;
      height: 80px;
      background: rgba(61, 170, 110, 0.15);
      color: #3DAA6E;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 1.5rem;
      border: 2px solid rgba(61, 170, 110, 0.3);
      box-shadow: 0 0 20px rgba(61, 170, 110, 0.2);
      animation: pulse-green 2s infinite;
    }

    h1 {
      font-family: 'Amiri', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.8rem;
      line-height: 1.2;
    }

    p {
      font-size: 1rem;
      color: var(--mist);
      line-height: 1.7;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    p strong {
      color: var(--gold-light);
      font-weight: 800;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 2rem;
      background: var(--gold);
      color: var(--ink);
      font-family: 'Cairo', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      text-decoration: none;
      border-radius: 5px;
      box-shadow: 0 4px 15px rgba(201, 169, 110, 0.3);
      transition: transform 0.3s;
      width: 100%;
    }

    .btn-back:hover {
      transform: translateY(-3px);
      background: #fff;
    }

    .footer-note {
      font-size: 0.85rem;
      color: var(--mist);
      margin-top: 2rem;
      opacity: 0.6;
    }

    @keyframes scaleUp {
      0% {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes pulse-green {
      0% {
        box-shadow: 0 0 0 0 rgba(61, 170, 110, 0.4);
      }

      70% {
        box-shadow: 0 0 0 15px rgba(61, 170, 110, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(61, 170, 110, 0);
      }
    }
  </style>
